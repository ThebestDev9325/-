<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>참을 인 쓰기 순서</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      color: #171717;
    }
    main {
      width: min(92vw, 520px);
      padding: 28px;
      text-align: center;
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 60px rgb(0 0 0 / 10%);
    }
    h1 { margin: 0 0 6px; font-size: 1.45rem; }
    p { margin: 0 0 20px; color: #6b7280; }
    .stage {
      display: grid;
      place-items: center;
      min-height: 330px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }
    img {
      width: min(80%, 300px);
      height: auto;
      image-rendering: auto;
      opacity: 1;
      transform: scale(0.63, 0.9);
      transition: opacity 140ms ease, transform 180ms ease;
      transform-origin: center;
    }
    .status { margin: 16px 0 12px; font-weight: 700; }
    .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    button, select {
      min-height: 42px;
      padding: 0 15px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: white;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }
    button.primary { border-color: #111827; background: #111827; color: white; }
    button:focus-visible, select:focus-visible { outline: 3px solid #93c5fd; outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <h1>참을 인(忍) 쓰기 순서</h1>
    <p>7단계 필획 애니메이션</p>
    <div class="stage">
      <img id="frame" src="images/1_centered.png" alt="참을 인 쓰기 1단계">
    </div>
    <div id="status" class="status" aria-live="polite">1 / 7</div>
    <div class="controls">
      <button id="prev" type="button">이전</button>
      <button id="toggle" class="primary" type="button">일시정지</button>
      <button id="next" type="button">다음</button>
      <select id="speed" aria-label="재생 속도">
        <option value="1200">느리게</option>
        <option value="800" selected>보통</option>
        <option value="450">빠르게</option>
      </select>
    </div>
  </main>
  <script>
    const total = 7;
    const frame = document.querySelector('#frame');
    const status = document.querySelector('#status');
    const toggle = document.querySelector('#toggle');
    const speed = document.querySelector('#speed');
    let current = 1;
    let playing = true;
    let timer;
    let swapTimer;

    function frameTransform(number) {
      // 1번 원본의 필획 폭만 유독 커서, 2번의 공통 검정 필획에 맞춘다.
      return number === 1 ? 'scale(0.63, 0.9)' : 'scale(1, 1)';
    }

    function show(number) {
      const next = ((number - 1 + total) % total) + 1;
      clearTimeout(swapTimer);
      frame.style.opacity = '0';
      swapTimer = setTimeout(() => {
        current = next;
        frame.src = `images/${current}_centered.png`;
        frame.alt = `참을 인 쓰기 ${current}단계`;
        frame.style.transform = frameTransform(current);
        status.textContent = `${current} / ${total}`;
        requestAnimationFrame(() => { frame.style.opacity = '1'; });
      }, 140);
    }

    function schedule() {
      clearInterval(timer);
      if (playing) timer = setInterval(() => show(current + 1), Number(speed.value));
    }

    document.querySelector('#prev').addEventListener('click', () => { show(current - 1); schedule(); });
    document.querySelector('#next').addEventListener('click', () => { show(current + 1); schedule(); });
    toggle.addEventListener('click', () => {
      playing = !playing;
      toggle.textContent = playing ? '일시정지' : '재생';
      schedule();
    });
    speed.addEventListener('change', schedule);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') show(current - 1);
      if (event.key === 'ArrowRight') show(current + 1);
      if (event.key === ' ') { event.preventDefault(); toggle.click(); }
    });
    schedule();
  </script>
</body>
</html>
